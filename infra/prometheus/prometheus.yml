global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'directory'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['directory:8081']

  - job_name: 'processing-core'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['processing-core:8082']
