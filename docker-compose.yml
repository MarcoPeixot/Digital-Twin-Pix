services:

  # --- Infraestrutura ---

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twinpix}
      POSTGRES_USER: ${POSTGRES_USER:-twinpix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twinpix123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twinpix}"]
      interval: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.4.0
    volumes:
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  # --- Servicos de dominio ---

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      directory:
        condition: service_healthy
      processing-core:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  directory:
    build: ./services/directory
    ports:
      - "${DIRECTORY_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EXPERIMENT_LATENCY_MS: ${DIRECTORY_EXPERIMENT_LATENCY_MS:-0}
      EXPERIMENT_LATENCY_JITTER_MS: ${DIRECTORY_EXPERIMENT_LATENCY_JITTER_MS:-0}
      EXPERIMENT_ERROR_RATE: ${DIRECTORY_EXPERIMENT_ERROR_RATE:-0.0}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  processing-core:
    build: ./services/processing-core
    ports:
      - "${PROCESSING_CORE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EXPERIMENT_PROCESSING_DELAY_MS: ${PROCESSING_EXPERIMENT_DELAY_MS:-0}
      EXPERIMENT_PROCESSING_DELAY_JITTER_MS: ${PROCESSING_EXPERIMENT_DELAY_JITTER_MS:-0}
      EXPERIMENT_ERROR_RATE: ${PROCESSING_EXPERIMENT_ERROR_RATE:-0.0}
      EXPERIMENT_WORKER_COUNT: ${PROCESSING_EXPERIMENT_WORKER_COUNT:-4}
      EXPERIMENT_QUEUE_CAPACITY: ${PROCESSING_EXPERIMENT_QUEUE_CAPACITY:-20}
      EXPERIMENT_QUEUE_WAIT_TIMEOUT_MS: ${PROCESSING_EXPERIMENT_QUEUE_WAIT_TIMEOUT_MS:-2000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  digital-twin:
    build: ./services/digital-twin
    ports:
      - "${DIGITAL_TWIN_PORT:-8090}:8090"
    depends_on:
      prometheus:
        condition: service_started
      api-gateway:
        condition: service_healthy
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      TWIN_POLL_INTERVAL_SECONDS: ${TWIN_POLL_INTERVAL_SECONDS:-5}

volumes:
  pgdata:
