server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        twinpix: true

spring:
  application:
    name: directory

experiment:
  latency-ms: ${EXPERIMENT_LATENCY_MS:0}
  latency-jitter-ms: ${EXPERIMENT_LATENCY_JITTER_MS:0}
  error-rate: ${EXPERIMENT_ERROR_RATE:0.0}
