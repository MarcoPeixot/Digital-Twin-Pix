server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        twinpix: true

spring:
  application:
    name: processing-core
  datasource:
    url: jdbc:postgresql://localhost:5432/twinpix
    username: twinpix
    password: twinpix123
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

experiment:
  processing-delay-ms: ${EXPERIMENT_PROCESSING_DELAY_MS:0}
  processing-delay-jitter-ms: ${EXPERIMENT_PROCESSING_DELAY_JITTER_MS:0}
  error-rate: ${EXPERIMENT_ERROR_RATE:0.0}
  worker-count: ${EXPERIMENT_WORKER_COUNT:4}
  queue-capacity: ${EXPERIMENT_QUEUE_CAPACITY:20}
  queue-wait-timeout-ms: ${EXPERIMENT_QUEUE_WAIT_TIMEOUT_MS:2000}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/twinpix
